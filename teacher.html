<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #dc3545;
      padding: 10px 20px;
      z-index: 1000;
    }
    
    .logout-btn:hover {
      background-color: #c82333;
    }
    
    .user-info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-weight: bold;
      color: #333;
      background: white;
      padding: 8px 15px;
      border-radius: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    
    .container {
      max-width: 800px;
      margin: 80px auto 20px;
      padding: 20px;
    }
    
    #questionInput {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #ccc;
      border-radius: 10px;
      margin-bottom: 20px;
      resize: vertical;
    }
    
    .student-answer {
      background: white;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #28a745;
      min-height: 100px;
      font-size: 18px;
      margin-top: 20px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .refresh-btn {
      background-color: #007bff;
      margin-left: 10px;
    }
    
    .refresh-btn:hover {
      background-color: #0056b3;
    }

    .answers-container {
      margin-top: 30px;
    }

    .answer-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      text-align: left;
    }

    .answer-card strong {
      color: #28a745;
    }

    .answer-card small {
      color: #666;
      display: block;
      margin-top: 5px;
    }

    .stats {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .clear-btn {
      background-color: #dc3545;
      margin-left: 10px;
    }

    .clear-btn:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <div class="user-info" id="userInfo">Loading user info...</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
  
  <div class="container">
    <h1>👩‍🏫 Teacher Dashboard</h1>

    <div class="stats" id="stats">
      Loading statistics...
    </div>

    <textarea id="questionInput" placeholder="Enter question here (e.g., Type the word: CAT)" rows="4">Type the word: CAT</textarea>
    <br>
    <button onclick="saveQuestion()">Save Question</button>
    <button class="refresh-btn" onclick="loadAnswers()">Refresh Answers</button>
    <button class="clear-btn" onclick="clearAllAnswers()">Clear All Answers</button>

    <h2>Current Student Answer:</h2>
    <div class="student-answer" id="currentStudentAnswer">No answer yet</div>

    <div class="answers-container">
      <h2>All Student Answers:</h2>
      <div id="allAnswers">Loading answers...</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "YOUR_NEW_KEY",
      authDomain: "eyeable-2026.firebaseapp.com",
      databaseURL: "https://eyeable-2026-default-rtdb.firebaseio.com",
      projectId: "eyeable-2026",
      storageBucket: "eyeable-2026.firebasestorage.app",
      messagingSenderId: "29944050006",
      appId: "1:29944050006:web:33515697c3aac35432e6f7",
      measurementId: "G-YMPV5EPEDV"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // Check authentication status
    auth.onAuthStateChanged((user) => {
      if (!user) {
        // No user logged in, redirect to login
        window.location.href = 'login.html';
        return;
      }

      // Check if user is a teacher
      database.ref('users/' + user.uid).once('value')
        .then((snapshot) => {
          const userData = snapshot.val();
          if (!userData || userData.role !== 'teacher') {
            // Wrong role or no role, redirect to appropriate page
            if (userData && userData.role === 'student') {
              window.location.href = 'index.html';
            } else {
              // No role assigned, redirect to login
              auth.signOut();
              window.location.href = 'login.html';
            }
            return;
          }

          // Display user info
          const displayName = userData.name || user.displayName || user.email;
          document.getElementById('userInfo').innerText = `Logged in as: ${displayName} (Teacher)`;
          
          // Load existing question
          loadExistingQuestion();
          
          // Load answers
          loadAnswers();
          
          // Set up real-time listener for answers
          setupAnswersListener();
        })
        .catch((error) => {
          console.error('Error checking user role:', error);
        });
    });

    // Load existing question
    function loadExistingQuestion() {
      database.ref('currentQuestion').once('value')
        .then((snapshot) => {
          const question = snapshot.val();
          if (question) {
            document.getElementById('questionInput').value = question;
          } else {
            // Try localStorage as fallback
            const savedQuestion = localStorage.getItem('question');
            if (savedQuestion) {
              document.getElementById('questionInput').value = savedQuestion;
            }
          }
        })
        .catch((error) => {
          console.error('Error loading question:', error);
        });
    }

    function saveQuestion() {
      const question = document.getElementById("questionInput").value;
      
      // Save to Firebase
      database.ref('currentQuestion').set(question)
        .then(() => {
          // Also save to localStorage as backup
          localStorage.setItem("question", question);
          alert("Question Saved! Students will now see: " + question);
        })
        .catch((error) => {
          console.error('Error saving question:', error);
          alert("Error saving question. Please try again.");
        });
    }

    function loadAnswers() {
      // Load the most recent answer (for backward compatibility)
      database.ref('answers').orderByKey().limitToLast(1).once('value')
        .then((snapshot) => {
          const answers = snapshot.val();
          if (answers) {
            // Get the most recent answer
            const latestAnswerKey = Object.keys(answers).pop();
            const latestAnswer = answers[latestAnswerKey];
            document.getElementById('currentStudentAnswer').innerText = 
              latestAnswer.text || "No answer yet";
          } else {
            // Fallback to localStorage
            const localAnswer = localStorage.getItem("answer");
            document.getElementById('currentStudentAnswer').innerText = localAnswer || "No answer yet";
          }
        })
        .catch((error) => {
          console.error('Error loading answers:', error);
          // Fallback to localStorage
          const localAnswer = localStorage.getItem("answer");
          document.getElementById('currentStudentAnswer').innerText = localAnswer || "No answer yet";
        });

      // Load all answers for display
      loadAllAnswers();
      updateStats();
    }

    function loadAllAnswers() {
      database.ref('answers').once('value')
        .then((snapshot) => {
          const answers = snapshot.val();
          const allAnswersDiv = document.getElementById('allAnswers');
          
          if (!answers) {
            allAnswersDiv.innerHTML = '<p>No answers yet</p>';
            return;
          }

          // Convert to array and sort by timestamp (newest first)
          const answersArray = Object.entries(answers).map(([key, value]) => ({
            id: key,
            ...value
          })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

          let html = '';
          answersArray.forEach(answer => {
            const date = answer.timestamp ? new Date(answer.timestamp).toLocaleString() : 'Unknown date';
            const studentName = answer.studentName || answer.studentEmail || 'Unknown student';
            
            html += `
              <div class="answer-card">
                <strong>${studentName}</strong>
                <p>${answer.text || ''}</p>
                <small>Submitted: ${date}</small>
              </div>
            `;
          });

          allAnswersDiv.innerHTML = html;
        })
        .catch((error) => {
          console.error('Error loading all answers:', error);
          document.getElementById('allAnswers').innerHTML = '<p>Error loading answers</p>';
        });
    }

    function updateStats() {
      database.ref('answers').once('value')
        .then((snapshot) => {
          const answers = snapshot.val();
          const totalAnswers = answers ? Object.keys(answers).length : 0;
          
          // Get unique students
          const uniqueStudents = new Set();
          if (answers) {
            Object.values(answers).forEach(answer => {
              if (answer.studentId) uniqueStudents.add(answer.studentId);
            });
          }

          document.getElementById('stats').innerHTML = `
            <strong>Statistics:</strong><br>
            Total Answers: ${totalAnswers}<br>
            Active Students: ${uniqueStudents.size}
          `;
        })
        .catch((error) => {
          console.error('Error updating stats:', error);
        });
    }

    function setupAnswersListener() {
      // Listen for new answers in real-time
      database.ref('answers').on('child_added', () => {
        loadAllAnswers();
        updateStats();
        loadAnswers(); // Update current answer
      });
    }

    function clearAllAnswers() {
      if (confirm('Are you sure you want to clear all answers? This cannot be undone.')) {
        database.ref('answers').remove()
          .then(() => {
            localStorage.removeItem('answer');
            document.getElementById('currentStudentAnswer').innerText = 'No answer yet';
            document.getElementById('allAnswers').innerHTML = '<p>No answers yet</p>';
            updateStats();
            alert('All answers cleared successfully');
          })
          .catch((error) => {
            console.error('Error clearing answers:', error);
            alert('Error clearing answers. Please try again.');
          });
      }
    }

    function logout() {
      auth.signOut().then(() => {
        // Clear login data but keep question
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        
        // Redirect to login
        window.location.href = 'login.html';
      }).catch((error) => {
        console.error('Logout error:', error);
        // Force redirect even if signout fails
        localStorage.clear();
        window.location.href = 'login.html';
      });
    }

    // Load answers initially and set up periodic refresh
    loadAnswers();
    setInterval(loadAnswers, 5000); // Refresh every 5 seconds
  </script>
</body>

</html>
